name: Release

# dev  branch  -> rolling pre-release tagged `mqlens-v<version>-dev.<sha>`
# main branch  -> the version is derived AUTOMATICALLY from Conventional Commits
#                 since the last stable tag (feat -> minor, fix/perf -> patch,
#                 BREAKING CHANGE or `!` -> major). The version files are bumped +
#                 committed back to main with [skip ci], then a stable
#                 `mqlens-v<version>` release is built. No manual bump needed; if
#                 there are no releasable commits the release is skipped.
on:
  push:
    branches: [main, dev]

# Don't cancel an in-flight release run (it could leave partial assets).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Auto-versioning (main only): compute the next semver from Conventional
  # Commits, bump the version files, and commit the bump back to main ([skip ci]
  # so it doesn't re-trigger). Outputs the new version + whether to release.
  version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.compute.outputs.version }}
      release: ${{ steps.compute.outputs.release }}
      notes: ${{ steps.compute.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compute + commit next version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          # Dev branch: derive a monotonic pre-release version that sorts ABOVE the
          # current stable (semver prereleases sort below their release, so we bump
          # the patch first): 0.4.0 -> 0.4.1-<run>. The prerelease identifier must be
          # numeric-only (and <= 65535) so the Windows MSI target accepts it, so we
          # use the run number alone (no "dev" word). Not committed; the build job
          # writes it into the version files locally before building.
          if [ "${{ github.ref_name }}" != "main" ]; then
            CUR=$(node -p "require('./package.json').version")
            BASE=${CUR%%-*}
            NEXT=$(node -e 'const p=process.argv[1].split(".").map(Number);p[2]++;process.stdout.write(p.join("."))' "$BASE")
            DEVV="${NEXT}-${GITHUB_RUN_NUMBER}"
            echo "version=$DEVV" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Dev build version: $DEVV"
            exit 0
          fi
          # Latest STABLE tag only (mqlens-vX.Y.Z with no prerelease suffix).
          LAST_TAG=$(git tag --list 'mqlens-v*' | grep -E '^mqlens-v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          RANGE=""
          [ -n "$LAST_TAG" ] && RANGE="${LAST_TAG}..HEAD"
          # Squash-merged PRs collapse their commits into one body whose subjects
          # survive as "* feat: …" bullets — accept the optional "* " prefix so a
          # squash merge of dev still produces a release.
          SUBJECTS=$(git log --no-merges --pretty=%B ${RANGE})
          if echo "$SUBJECTS" | grep -qiE '(^|[[:space:]])BREAKING[ -]CHANGE' \
             || echo "$SUBJECTS" | grep -qE '^(\* )?[a-z]+(\([^)]*\))?!:'; then
            BUMP=major
          elif echo "$SUBJECTS" | grep -qE '^(\* )?feat(\([^)]*\))?:'; then
            BUMP=minor
          elif echo "$SUBJECTS" | grep -qE '^(\* )?(fix|perf)(\([^)]*\))?:'; then
            BUMP=patch
          else
            BUMP=none
          fi
          echo "Detected bump since ${LAST_TAG:-<start>}: $BUMP"
          if [ "$BUMP" = "none" ]; then
            # A "release: vX.Y" merge that yields no bump means detection failed
            # (an unrecognized merge style, not an empty release) — fail loudly
            # instead of skipping the release silently, as happened with v0.12.
            if git log -1 --pretty=%s | grep -qiE '^release[:(]'; then
              echo "::error::HEAD is a release merge but no releasable commits were detected since ${LAST_TAG:-<start>} — bump detection likely doesn't understand this merge style."
              exit 1
            fi
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable (feat/fix/perf/breaking) commits — skipping release."
            exit 0
          fi
          CUR=$(node -p "require('./package.json').version")
          NEW=$(node -e 'const p=process.argv[1].split(".").map(Number);const k=process.argv[2];if(k==="major"){p[0]++;p[1]=0;p[2]=0}else if(k==="minor"){p[1]++;p[2]=0}else{p[2]++}process.stdout.write(p.join("."))' "$CUR" "$BUMP")
          echo "Releasing $CUR -> $NEW"
          node -e '
            const fs=require("fs");const v=process.argv[1];
            const sub=(p,re,to)=>{const s=fs.readFileSync(p,"utf8");const n=s.replace(re,to);if(n===s)throw new Error("no version match in "+p);fs.writeFileSync(p,n)};
            sub("package.json",/("version":\s*)"[^"]+"/,`$1"${v}"`);
            sub("src-tauri/tauri.conf.json",/("version":\s*)"[^"]+"/,`$1"${v}"`);
            sub("src-tauri/Cargo.toml",/^version = "[^"]+"/m,`version = "${v}"`);
            sub("src-tauri/Cargo.lock",/(name = "tauri-app"\r?\nversion = ")[^"]+(")/,`$1${v}$2`);
          ' "$NEW"
          # Grouped changelog → release body AND latest.json notes (so the in-app
          # update dialog shows real notes, not a placeholder).
          strip='s/^\* //; s/^[a-z]+(\([^)]*\))?!?:[[:space:]]*//'
          FEATS=$(git log --no-merges --pretty=%B ${RANGE} | grep -E '^(\* )?feat(\([^)]*\))?:' | sed -E "$strip" | sed 's/^/- /' || true)
          FIXES=$(git log --no-merges --pretty=%B ${RANGE} | grep -E '^(\* )?(fix|perf)(\([^)]*\))?:' | sed -E "$strip" | sed 's/^/- /' || true)
          {
            echo "notes<<__NOTES_EOF__"
            [ -n "$FEATS" ] && printf '### Features\n%s\n\n' "$FEATS"
            [ -n "$FIXES" ] && printf '### Fixes\n%s\n\n' "$FIXES"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git commit -am "chore(release): mqlens-v${NEW} [skip ci]"
          git push origin HEAD:main
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    # Always run on dev (prereleases); on main only when the version job
    # determined there is something to release.
    if: ${{ always() && (github.ref_name != 'main' || needs.version.outputs.release == 'true') }}
    permissions:
      contents: write
    env:
      # macOS signing + notarization switch on automatically once the Apple
      # secrets are present; builds stay unsigned until then.
      ENABLE_MAC_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest      # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04      # Linux
            target: ''
            args: ''
          - platform: windows-latest    # Windows
            target: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On main, the version job already pushed the bump commit — build it.
          ref: ${{ github.ref_name == 'main' && 'main' || github.sha }}

      # Tauri v2 + GSSAPI (mongodb gssapi-auth) build dependencies.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libkrb5-dev \
            clang \
            libclang-dev \
            build-essential \
            curl wget file

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Write the resolved version into the bundle version files so the built app
      # and its updater manifest carry it. On main the version job already
      # committed this value (idempotent here); on dev it's <next>-dev.<run>.
      - name: Set build version
        shell: bash
        run: |
          V="${{ needs.version.outputs.version }}"
          node -e '
            const fs=require("fs");const v=process.argv[1];
            const sub=(p,re,to)=>{const s=fs.readFileSync(p,"utf8");if(!re.test(s))throw new Error("no version field in "+p);fs.writeFileSync(p,s.replace(re,to))};
            sub("package.json",/("version":\s*)"[^"]+"/,`$1"${v}"`);
            sub("src-tauri/tauri.conf.json",/("version":\s*)"[^"]+"/,`$1"${v}"`);
            sub("src-tauri/Cargo.toml",/^version = "[^"]+"/m,`version = "${v}"`);
            sub("src-tauri/Cargo.lock",/(name = "tauri-app"\r?\nversion = ")[^"]+(")/,`$1${v}$2`);
          ' "$V"
          echo "Built version: $V"

      # Notarization uses an App Store Connect API key (.p8). Materialize it to
      # a file on the runner; tauri-action reads APPLE_API_KEY_PATH from there.
      - name: Prepare Apple API key (macOS signing)
        if: matrix.platform == 'macos-latest' && env.ENABLE_MAC_SIGNING == 'true'
        run: |
          echo "${{ secrets.APPLE_API_KEY_P8 }}" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple_api_key.p8" >> "$GITHUB_ENV"

      # The biometry feature needs restricted keychain entitlements, which macOS
      # only grants if a matching Developer ID provisioning profile is embedded in
      # the bundle. tauri.conf.json's bundle.macOS.files copies this file into
      # Contents/embedded.provisionprofile *before* Tauri signs, so the signature
      # seals it. Without it the signed app is killed on launch (AMFI error -413).
      # The profile must be issued for the same Developer ID cert that
      # APPLE_SIGNING_IDENTITY resolves to, or AMFI rejects it.
      - name: Prepare provisioning profile (macOS signing)
        if: matrix.platform == 'macos-latest' && env.ENABLE_MAC_SIGNING == 'true'
        run: |
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode > src-tauri/embedded.provisionprofile
          # Fail loudly: an empty/unset secret yields a 0-byte profile that still
          # signs and notarizes fine but is killed by AMFI on launch (-413). Don't
          # ship that silently.
          if [ ! -s src-tauri/embedded.provisionprofile ]; then
            echo "::error::APPLE_PROVISIONING_PROFILE secret is empty or unset — the signed app would be killed on launch (AMFI -413). Set the secret to the base64 of the Developer ID provisioning profile."
            exit 1
          fi

      # Stable -> mqlens-v<version>. Dev -> a unique semver pre-release carrying
      # the build's short SHA (e.g. mqlens-v0.1.0-dev.a1b2c3d) so every dev build
      # gets its own tag and nothing collides with the `dev` branch name.
      # Unified tag: the version (dev already carries -dev.<run>) drives the tag
      # for every job, so build, notes, signing and the manifest agree.
      - name: Compute release tag
        shell: bash
        run: |
          echo "REL_TAG=mqlens-v${{ needs.version.outputs.version }}" >> "$GITHUB_ENV"
          echo "REL_NAME=MQLens v${{ needs.version.outputs.version }}" >> "$GITHUB_ENV"

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — produces signed update artifacts + latest.json so
          # the in-app updater can verify downloads. Generate a keypair with
          #   npm run tauri signer generate -- -w ~/.tauri/mqlens.key
          # then set these repo secrets and paste the PUBLIC key into
          # src-tauri/tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (App Store Connect API key).
          # All inactive until the matching repo secrets are set, so non-mac
          # builds and unsigned macOS builds are unaffected.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH is exported by the prepare step above (macOS only).
        with:
          tagName: ${{ env.REL_TAG }}
          releaseName: ${{ env.REL_NAME }}
          # On main, real notes are computed in the version job and baked into
          # latest.json here; dev keeps a placeholder filled in by release-notes.
          releaseBody: ${{ needs.version.outputs.notes || 'Generating release notes…' }}
          prerelease: ${{ github.ref_name != 'main' }}
          args: ${{ matrix.args }}
          # Each matrix job uploads its own binaries + signatures, but NOT
          # latest.json — the parallel jobs would race on that single asset
          # (causing "Not Found - update-a-release-asset"). The updater-manifest
          # job below assembles and uploads latest.json once, after all builds.
          includeUpdaterJson: false

  # Replace the placeholder body with real notes once the bundles are uploaded:
  # an auto-generated changelog for stable (main) releases, or a recent-commit
  # list for rolling dev builds.
  # Dev only: stable (main) notes are written by the version job and already in
  # latest.json. This fills the dev pre-release body + prunes old dev releases.
  release-notes:
    needs: [version, build]
    if: github.ref_name != 'main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name == 'main' && 'main' || github.sha }}
      - name: Compose and publish release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="mqlens-v${VERSION}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            gh api --method POST "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" --jq '.body' > notes.md
          else
            {
              echo "Development pre-release — unstable, not for production."
              echo ""
              echo "**Commit:** \`${{ github.sha }}\`"
              echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')"
              echo ""
              echo "### Recent changes"
              git log -15 --no-merges --pretty='- %s (%h)'
            } > notes.md
          fi
          gh release edit "$TAG" --notes-file notes.md

      # Keep the Releases page tidy: on dev, keep only the 10 newest dev
      # pre-releases (tags like mqlens-vX.Y.Z-<run>) and delete the rest + their
      # tags. Excludes the permanent `dev-channel` manifest release.
      - name: Prune old dev pre-releases
        if: github.ref_name != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt,isPrerelease \
            --jq '[.[] | select(.isPrerelease and (.tagName | test("-[0-9]+$")))]
                  | sort_by(.createdAt) | reverse | .[10:] | .[].tagName' \
          | while read -r t; do
              [ -n "$t" ] && gh release delete "$t" --cleanup-tag --yes
            done

  # Attach detached GPG signatures (.asc) to every release asset so users can
  # verify authenticity (`gpg --verify file.asc file`). Activates automatically
  # once the GPG_PRIVATE_KEY secret is set; otherwise it's a no-op.
  sign-artifacts:
    needs: [version, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      ENABLE_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name == 'main' && 'main' || github.sha }}
      - name: Import GPG key
        if: env.ENABLE_GPG == 'true'
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import
      - name: Sign release assets
        if: env.ENABLE_GPG == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="mqlens-v${VERSION}"
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5; exit}')
          mkdir -p _assets && cd _assets
          gh release download "$TAG" --repo "${{ github.repository }}" --clobber
          shopt -s nullglob
          for f in *; do
            case "$f" in *.asc) continue ;; esac
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
                --local-user "$KEYID" --armor --detach-sign --output "$f.asc" "$f"
          done
          if ls *.asc >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "${{ github.repository }}" *.asc --clobber
          fi

  # Sign the Windows installers (.exe / .msi) with Azure Trusted Signing and
  # replace the unsigned assets on the release. Activates once the AZURE_*
  # secrets are set; otherwise a no-op.
  sign-windows:
    needs: [version, build]
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ENABLE_WIN_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        if: env.ENABLE_WIN_SIGNING == 'true'
        with:
          ref: ${{ github.ref_name == 'main' && 'main' || github.sha }}

      - name: Download Windows installers from the release
        if: env.ENABLE_WIN_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="mqlens-v${VERSION}"
          echo "REL_TAG=$TAG" >> "$GITHUB_ENV"
          mkdir -p win-assets
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern '*.exe' --pattern '*.msi' --dir win-assets --clobber

      - name: Azure Trusted Signing
        if: env.ENABLE_WIN_SIGNING == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
          files-folder: ${{ github.workspace }}\win-assets
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-upload signed installers
        if: env.ENABLE_WIN_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "$REL_TAG" win-assets/*.exe win-assets/*.msi --repo "${{ github.repository }}" --clobber

  # Assemble latest.json ONCE from the per-platform signatures the matrix uploaded
  # (the matrix set includeUpdaterJson:false so the parallel jobs never race on it),
  # then publish it per channel:
  #   stable (main) -> the release itself, served at releases/latest/download/latest.json
  #   dev           -> the permanent `dev-channel` pre-release, giving the in-app
  #                    dev channel a stable URL that points at this build's assets.
  updater-manifest:
    needs: [version, build]
    if: ${{ always() && needs.build.result == 'success' && (github.ref_name != 'main' || needs.version.outputs.release == 'true') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name == 'main' && 'main' || github.sha }}
      - name: Compose and publish updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
          NOTES: ${{ needs.version.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          export REL_TAG="mqlens-v${VERSION}"
          mkdir -p sigs
          gh release download "$REL_TAG" --repo "$REPO" --pattern '*.sig' --dir sigs --clobber
          node .github/scripts/compose-latest.cjs
          if [ "${{ github.ref_name }}" = "main" ]; then
            gh release upload "$REL_TAG" latest.json --repo "$REPO" --clobber
          else
            gh release view dev-channel --repo "$REPO" >/dev/null 2>&1 || \
              gh release create dev-channel --repo "$REPO" --prerelease \
                --title "Dev channel" \
                --notes "Rolling dev-channel updater manifest. Do not delete." \
                --target "$GITHUB_SHA"
            gh release upload dev-channel latest.json --repo "$REPO" --clobber
          fi
